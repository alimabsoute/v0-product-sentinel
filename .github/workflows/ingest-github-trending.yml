name: Ingest — GitHub Trending

on:
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC (1h after PH)
  workflow_dispatch:
    inputs:
      limit:
        description: 'Number of repos to fetch'
        default: '20'
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GitHub Trending ingestion
        run: pnpm tsx --env-file=/dev/null scripts/ingest-github-trending.ts --limit=${{ github.event.inputs.limit || '20' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
