name: Ingest — News Feed

on:
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch:
    inputs:
      limit:
        description: 'Articles per source to fetch'
        default: '30'
        required: false
      source:
        description: 'Single source name (e.g. TechCrunch) — leave blank for all'
        default: ''
        required: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run news ingestion
        run: |
          ARGS="--limit=${{ github.event.inputs.limit || '30' }}"
          if [ -n "${{ github.event.inputs.source }}" ]; then
            ARGS="$ARGS --source=${{ github.event.inputs.source }}"
          fi
          pnpm tsx --env-file=/dev/null scripts/ingest-news.ts $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
